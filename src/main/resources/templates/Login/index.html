<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - BiblioUni</title>
    <meta charset="UTF-8">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background: linear-gradient(135deg,#4e73df,#1cc88a);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family: Arial, sans-serif;
        }

        .login-card{
            width:380px;
            padding:35px;
            border-radius:12px;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
            background:white;
        }

        .login-title{
            text-align:center;
            margin-bottom:25px;
            font-weight:bold;
        }

        .btn-login{
            width:100%;
        }

    </style>

</head>

<body>

<div class="login-card">

    <h3 class="login-title">📚 BiblioUni</h3>

    <form th:action="@{/login}" method="post">

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="text" class="form-control" name="email" placeholder="Ingresa tu email" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Contraseña</label>
            <input type="password" class="form-control" name="password" placeholder="Ingresa tu contraseña" required>
        </div>

        <button type="submit" class="btn btn-primary btn-login">
            Ingresar
        </button>

    </form>

    <br>

    <div th:if="${param.error}" class="alert alert-danger text-center">
        Email o contraseña incorrectos
    </div>

    <div th:if="${param.logout}" class="alert alert-success text-center">
        Sesión cerrada correctamente
    </div>

</div>

</body>
</html>
