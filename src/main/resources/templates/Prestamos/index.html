<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="mainTemplate.html :: layout">

<body>

<div th:fragment="content">

    <div class="container mt-4">

        <h2 class="mb-4">Listado de Préstamos</h2>

        <a th:href="@{/prestamos/registrar}" class="btn btn-success mb-3">
            Registrar Préstamo
        </a>

        <table class="table table-bordered table-striped">

            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Usuario</th>
                <th>Libro</th>
                <th>Fecha Préstamo</th>
                <th>Fecha Devolución</th>
                <th>Estado</th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="prestamo : ${prestamos}">

                <td th:text="${prestamo.id}"></td>
                <td th:text="${prestamo.usuario.nombre}"></td>
                <td th:text="${prestamo.libro.titulo}"></td>
                <td th:text="${prestamo.fechaPrestamo}"></td>
                <td th:text="${prestamo.fechaDevolucion}"></td>
                <td th:text="${prestamo.estado}"></td>

            </tr>

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
